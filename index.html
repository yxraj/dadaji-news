<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dadaji News</title>
  <meta name="description" content="Dadaji News — Top headlines across Science, Sports, Technology, Business and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ TICKER ░░ -->
  <div id="ticker" class="ticker">
    <div class="ticker__label">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Breaking
    </div>
    <div class="ticker__viewport">
      <div id="ticker-inner" class="ticker__inner">
        <!-- JS populates this -->
      </div>
    </div>
  </div>

  <!-- ░░ HEADER ░░ -->
  <header class="header">
    <div class="header__inner">

      <a class="logo" href="#" onclick="resetToHome();return false;">
        <span class="logo__icon">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 3a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        </span>
        <span class="logo__text">
          <span class="logo__name">Dadaji</span>
          <span class="logo__sub">Morning News</span>
        </span>
      </a>

      <div class="search">
        <svg class="search__icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" class="search__input" type="search" placeholder="Search headlines, topics or stories…" autocomplete="off" />
        <button id="search-clear" class="search__clear" aria-label="Clear">✕</button>
      </div>

      <button id="theme-btn" class="theme-btn" aria-label="Toggle theme">
        <svg id="icon-moon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun"  width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>

    </div>
  </header>

  <!-- ░░ CATEGORY TABS ░░ -->
  <nav id="cat-nav" class="cat-nav">
    <div class="cat-nav__inner">
      <button class="cat-pill active" data-cat="general">General</button>
      <button class="cat-pill" data-cat="world">World</button>
      <button class="cat-pill" data-cat="business">Business</button>
      <button class="cat-pill" data-cat="technology">Technology</button>
      <button class="cat-pill" data-cat="science">Science</button>
      <button class="cat-pill" data-cat="health">Health</button>
      <button class="cat-pill" data-cat="sports">Sports</button>
      <button class="cat-pill" data-cat="entertainment">Entertainment</button>
      <button class="cat-pill" data-cat="education">Education</button>
    </div>
  </nav>

  <!-- ░░ MAIN ░░ -->
  <main class="main">

    <!-- Search heading -->
    <div id="search-banner" class="search-banner" style="display:none">
      <h2 class="search-banner__title">Results for <em id="search-term"></em></h2>
      <button class="search-banner__clear" onclick="clearSearch()">Clear</button>
    </div>

    <!-- States -->
    <div id="state-loading" class="state">
      <div id="skeletons" class="grid"></div>
    </div>

    <div id="state-error" class="state state--center" style="display:none">
      <div class="state-box">
        <div class="state-box__icon state-box__icon--err">
          <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        </div>
        <h3>Couldn't load news</h3>
        <p>API rate limit or network error. Wait a moment, then retry.</p>
        <button id="retry-btn" class="btn-accent">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Retry
        </button>
      </div>
    </div>

    <div id="state-empty" class="state state--center" style="display:none">
      <div class="state-box">
        <div class="state-box__icon">
          <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <h3>No results found</h3>
        <p>Try a different keyword or category.</p>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>

    <!-- Infinite scroll sentinel -->
    <div id="sentinel"></div>

    <!-- Load more spinner -->
    <div id="load-more" class="load-more" style="display:none">
      <span class="spinner"></span>
      <span>Loading more…</span>
    </div>

    <!-- End message -->
    <div id="end-msg" class="end-msg" style="display:none">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z"/><path d="M16 2v4H8V2"/></svg>
      You've reached the end of today's edition.
    </div>

  </main>

  <!-- Scroll-to-top -->
  <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
